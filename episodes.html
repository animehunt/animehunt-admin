<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Episodes CMS – AnimeHunt</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== BASE ===== */
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui;}
body{background:#060a14;color:#fff;}
.cms-app{display:flex;min-height:100vh}

/* ===== SIDEBAR ===== */
.cms-sidebar{
  width:230px;background:#070b16;border-right:1px solid #1a2035;padding:14px 0;
}
.brand{padding:0 18px 14px;font-size:20px}
.brand b{color:#ffcc00}
.brand small{display:block;font-size:11px;color:#888}
.cms-menu a{
  display:block;padding:10px 18px;color:#ccc;text-decoration:none;font-size:14px
}
.cms-menu a:hover,.cms-menu a.active{background:#0e1424;color:#ffcc00}

/* ===== MAIN ===== */
.cms-main{flex:1;display:flex;flex-direction:column}
.cms-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px;background:#070b16;border-bottom:1px solid #1a2035
}
.add-btn{
  background:#ffcc00;border:none;padding:8px 16px;border-radius:8px;
  font-weight:600;cursor:pointer
}
.cms-content{padding:20px}

/* ===== FILTERS ===== */
.episode-filters{display:flex;gap:10px;margin-bottom:16px}
.episode-filters input,.episode-filters select{
  background:#0b0f1a;border:1px solid #1a2035;color:#fff;
  padding:8px 10px;border-radius:6px;font-size:12px
}

/* ===== TABLE ===== */
.episode-table{
  background:#0b0f1a;border:1px solid #1a2035;border-radius:12px;overflow:hidden
}
.table-head,.row{
  display:grid;
  grid-template-columns:1.2fr 70px 70px 1fr 90px 90px 110px;
  padding:12px;font-size:12px;align-items:center
}
.table-head{background:#0e1424;color:#aaa}
.row{border-top:1px solid #1a2035}
.badge{
  background:#1a2035;padding:3px 7px;border-radius:6px;font-size:10px
}
.actions button{
  background:none;border:none;color:#ffcc00;cursor:pointer;margin-right:6px
}

/* ===== MODAL ===== */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;z-index:999
}
.modal-box{
  width:820px;background:#0b0f1a;border:1px solid #1a2035;
  border-radius:14px;overflow:hidden
}
.modal-header{
  padding:14px 16px;background:#0e1424;display:flex;justify-content:space-between
}
.modal-body{padding:16px}
.modal-footer{
  padding:14px 16px;background:#0e1424;text-align:right
}
.modal-footer button{
  background:#ffcc00;border:none;padding:8px 18px;border-radius:8px;font-weight:600
}

/* ===== FORM ===== */
.form-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px
}
.form-grid input,.form-grid textarea,.form-grid select{
  background:#0e1424;border:1px solid #1a2035;color:#fff;
  padding:8px 10px;border-radius:6px;font-size:12px
}
.form-grid textarea{grid-column:1/4;height:70px;resize:none}
.check{display:flex;gap:6px;align-items:center;font-size:12px}

/* ===== DOWNLOAD ===== */
.download-section{grid-column:1/4;border-top:1px solid #1a2035;padding-top:12px}
.download-host{margin-bottom:14px}
.quality-row{display:flex;gap:8px;margin-top:6px}
.quality-row select,.quality-row input{flex:1}
.add-quality{
  width:38px;background:#0e1424;border:1px solid #1a2035;
  color:#ffcc00;border-radius:6px;cursor:pointer
}
</style>
</head>

<body>

<div class="cms-app">

<!-- SIDEBAR -->
<aside class="cms-sidebar">
  <div class="brand">
    <span>Anime</span><b>Hunt</b>
    <small>CMS</small>
  </div>

  <nav class="cms-menu">

    <!-- CORE -->
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="anime.html">🎬 Anime</a>
    <a href="episodes.html" class="active">📺 Episodes</a>
    <a href="categories.html">🗂 Catagorys</a>
    <a href="banners.html">🖼 Banners</a>
    <a href="homepage.html">🏠 Homepage</a>

    <!-- CONTENT -->
    <a href="downloads.html">📥 Downloads</a>
    <a href="servers.html">🌐 Servers</a>
    <a href="player.html">🎞 Player</a>
    <a href="search.html">🔍 Search</a>

    <!-- DATA & SEO -->
    <a href="seo.html">📈 Seo</a>
    <a href="analytics.html">📊 Analytics</a>
    <a href="performance.html">⚡ Performance</a>

    <!-- SECURITY & DEPLOY -->
    <a href="security.html">🔐 Security</a>
    <a href="deploy-backup.html">🚀 Deploy-backup</a>

    <!-- AI & ADS -->
    <a href="ads.html">📢 Ads</a>
    <a href="ai-brain.html">🧠 Ai Brain</a>

    <!-- LAYOUT CONTROL -->
    <a href="sidebar.html">📌 Sidebar</a>
    <a href="footer.html">🦶 Footer</a>

    <!-- ADMIN / SYSTEM (LAST) -->
    <a href="system-settings.html">⚙ System-settings</a>

  </nav>
</aside>
<!-- MAIN -->
<main class="cms-main">
<header class="cms-header">
  <div>📺 Episode Management</div>
  <button class="add-btn" id="openAddEpisode">➕ Add Episode</button>
</header>

<section class="cms-content">
<div class="episode-table">
  <div class="table-head">
    <span>Anime</span><span>S</span><span>E</span><span>Title</span>
    <span>Servers</span><span>DL</span><span>Actions</span>
  </div>
  <div id="episodeList"></div>
</div>
</section>
</main>
</div>

<!-- MODAL -->
<div class="modal" id="episodeModal">
<div class="modal-box">
<div class="modal-header">
  <h3>Add Episode</h3><span id="closeModal">✕</span>
</div>

<div class="modal-body">
<div class="form-grid">

<input id="animeName" placeholder="Anime Title">
<input id="seasonNo" placeholder="Season">
<input id="episodeNo" placeholder="Episode">
<input id="episodeTitle" placeholder="Episode Title">

<input id="server1" placeholder="Server 1 URL">
<input id="server2" placeholder="Server 2 URL">
<input id="server3" placeholder="Server 3 URL">

<textarea id="description" placeholder="Description"></textarea>

<div class="download-section">

<div class="download-host">
<input class="host-name" placeholder="Host Name (Upload4ever)">
<div class="quality-row">
<select>
  <option>480p</option><option>720p</option><option>1080p</option>
  <option>4K</option><option>ZIP</option>
</select>
<input class="quality-link" placeholder="Download Link">
<button type="button" class="add-quality">＋</button>
</div>
</div>

</div>

<label class="check"><input type="checkbox" id="isOngoing"> Ongoing</label>
<label class="check"><input type="checkbox" id="isFeatured"> Featured</label>

</div>
</div>

<div class="modal-footer">
<button id="saveEpisode">💾 Save Episode</button>
</div>
</div>
</div>

<script>
 /* ============================================================
   ANIMEHUNT CMS - EPISODE MANAGER (FIXED)
   ============================================================ */

const API = "https://animehunt-backend.animehunt715.workers.dev/api/admin/episodes";
let editId = null;

// Helpers
const apiFetch = async (url, options = {}) => {
    const res = await fetch(url, {
        ...options,
        headers: { "Content-Type": "application/json", ...options.headers }
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
};

function createQualityRowHTML(q = "720p", url = "") {
    return `
        <div class="quality-row" style="display:flex; gap:8px; margin-top:6px">
            <select style="width:100px; background:#0e1424; color:#fff; border:1px solid #1a2035; border-radius:6px">
                <option ${q==='480p'?'selected':''}>480p</option>
                <option ${q==='720p'?'selected':''}>720p</option>
                <option ${q==='1080p'?'selected':''}>1080p</option>
                <option ${q==='4K'?'selected':''}>4K</option>
                <option ${q==='ZIP'?'selected':''}>ZIP</option>
            </select>
            <input class="quality-link" placeholder="Download Link" value="${url}" style="flex:1; background:#0e1424; border:1px solid #1a2035; color:#fff; padding:6px; border-radius:6px">
            <button type="button" onclick="this.parentElement.remove()" style="background:none; border:none; color:#ff4d4d; cursor:pointer">✕</button>
        </div>`;
}

function createHostBlock(hostName = "", links = []) {
    const div = document.createElement("div");
    div.className = "download-host";
    div.style.background = "#0e1424";
    div.style.padding = "10px";
    div.style.borderRadius = "8px";
    div.style.marginTop = "10px";

    let rowsHTML = links.length > 0 
        ? links.map(l => createQualityRowHTML(l.quality, l.url)).join('') 
        : createQualityRowHTML();

    div.innerHTML = `
        <div style="display:flex; gap:10px; margin-bottom:10px">
            <input class="host-name" placeholder="Host (e.g. Terabox)" value="${hostName}" style="flex:1; background:#0b0f1a; border:1px solid #1a2035; color:#fff; padding:6px; border-radius:6px">
            <button type="button" onclick="this.closest('.download-host').remove()" style="background:none; border:none; color:#ff4d4d; cursor:pointer">✕ Remove</button>
        </div>
        <div class="quality-container">${rowsHTML}</div>
        <button type="button" class="add-quality-btn" style="width:100%; margin-top:5px; background:#1a2035; color:#ffcc00; border:1px solid #333; cursor:pointer; padding:4px; border-radius:6px">＋ Add Quality</button>
    `;
    document.querySelector(".download-section").appendChild(div);
}

// Global Click for "Add Quality"
document.addEventListener("click", e => {
    if (e.target.classList.contains("add-quality-btn")) {
        const container = e.target.previousElementSibling;
        const temp = document.createElement('div');
        temp.innerHTML = createQualityRowHTML();
        container.appendChild(temp.firstElementChild);
    }
});

/** 1. SAVE EPISODE **/
document.getElementById("saveEpisode").onclick = async () => {
    const saveBtn = document.getElementById("saveEpisode");
    try {
        const payload = {
            anime: document.getElementById("animeName").value.trim(),
            season: document.getElementById("seasonNo").value || "1",
            episode: document.getElementById("episodeNo").value || "1",
            title: document.getElementById("episodeTitle").value.trim(),
            description: document.getElementById("description").value,
            servers: [
                document.getElementById("server1").value.trim(),
                document.getElementById("server2").value.trim(),
                document.getElementById("server3").value.trim()
            ].filter(s => s !== ""),
            downloads: [],
            ongoing: document.getElementById("isOngoing").checked,
            featured: document.getElementById("isFeatured").checked
        };

        if (!payload.anime || !payload.episode) return alert("Anime and Episode are mandatory");

        document.querySelectorAll(".download-host").forEach(block => {
            const host = block.querySelector(".host-name").value.trim();
            const links = [];
            block.querySelectorAll(".quality-row").forEach(row => {
                const url = row.querySelector(".quality-link").value.trim();
                if (url) links.push({ quality: row.querySelector("select").value, url });
            });
            if (host && links.length > 0) payload.downloads.push({ host, links });
        });

        saveBtn.disabled = true;
        saveBtn.innerText = "Processing...";

        const method = editId ? "PATCH" : "POST";
        const url = editId ? `${API}/${editId}` : API;

        await apiFetch(url, { method, body: JSON.stringify(payload) });
        location.reload(); 

    } catch (e) { alert(e.message); saveBtn.disabled = false; }
};

/** 2. LOAD & EDIT **/
async function loadEpisodes() {
    const list = await apiFetch(API);
    const container = document.getElementById("episodeList");
    container.innerHTML = "";
    list.forEach(e => {
        const row = document.createElement("div");
        row.className = "row";
        const dlCount = e.downloads.reduce((acc, h) => acc + h.links.length, 0);
        row.innerHTML = `
            <span>${e.anime}</span>
            <span class="badge">S${e.season}</span>
            <span class="badge">E${e.episode}</span>
            <span style="color:#888">${e.title || '---'}</span>
            <span>${e.servers.length} Srv</span>
            <span>${dlCount} DL</span>
            <span class="actions">
                <button onclick="editEpisode('${e.id}')">✏️</button>
                <button onclick="removeEpisode('${e.id}')" style="color:#ff4d4d">🗑</button>
            </span>`;
        container.appendChild(row);
    });
}

window.editEpisode = async (id) => {
    editId = id;
    const e = await apiFetch(`${API}/${id}`);
    document.getElementById("animeName").value = e.anime;
    document.getElementById("seasonNo").value = e.season;
    document.getElementById("episodeNo").value = e.episode;
    document.getElementById("episodeTitle").value = e.title;
    document.getElementById("description").value = e.description;
    document.getElementById("server1").value = e.servers[0] || "";
    document.getElementById("server2").value = e.servers[1] || "";
    document.getElementById("server3").value = e.servers[2] || "";
    document.getElementById("isOngoing").checked = e.ongoing;
    document.getElementById("isFeatured").checked = e.featured;

    document.querySelector(".download-section").innerHTML = "";
    if (e.downloads.length) e.downloads.forEach(d => createHostBlock(d.host, d.links));
    else createHostBlock();

    document.getElementById("episodeModal").style.display = "flex";
};

window.removeEpisode = async (id) => {
    if (confirm("Confirm delete?")) {
        await apiFetch(`${API}/${id}`, { method: "DELETE" });
        loadEpisodes();
    }
};

// Modal Fix
document.getElementById("openAddEpisode").onclick = () => {
    editId = null;
    document.querySelectorAll(".form-grid input, textarea").forEach(i => i.value = "");
    document.querySelector(".download-section").innerHTML = "";
    createHostBlock();
    document.getElementById("episodeModal").style.display = "flex";
};
document.getElementById("closeModal").onclick = () => document.getElementById("episodeModal").style.display = "none";

loadEpisodes();
  
                                                            
</script>

</body>
</html>
