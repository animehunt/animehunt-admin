<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Episodes CMS – AnimeHunt</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== BASE ===== */
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui;}
body{background:#060a14;color:#fff;}
.cms-app{display:flex;min-height:100vh}

/* ===== SIDEBAR ===== */
.cms-sidebar{
  width:230px;background:#070b16;border-right:1px solid #1a2035;padding:14px 0;
}
.brand{padding:0 18px 14px;font-size:20px}
.brand b{color:#ffcc00}
.brand small{display:block;font-size:11px;color:#888}
.cms-menu a{
  display:block;padding:10px 18px;color:#ccc;text-decoration:none;font-size:14px
}
.cms-menu a:hover,.cms-menu a.active{background:#0e1424;color:#ffcc00}

/* ===== MAIN ===== */
.cms-main{flex:1;display:flex;flex-direction:column}
.cms-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px;background:#070b16;border-bottom:1px solid #1a2035
}
.add-btn{
  background:#ffcc00;border:none;padding:8px 16px;border-radius:8px;
  font-weight:600;cursor:pointer
}
.cms-content{padding:20px}

/* ===== FILTERS ===== */
.episode-filters{display:flex;gap:10px;margin-bottom:16px}
.episode-filters input,.episode-filters select{
  background:#0b0f1a;border:1px solid #1a2035;color:#fff;
  padding:8px 10px;border-radius:6px;font-size:12px
}

/* ===== TABLE ===== */
.episode-table{
  background:#0b0f1a;border:1px solid #1a2035;border-radius:12px;overflow:hidden
}
.table-head,.row{
  display:grid;
  grid-template-columns:1.2fr 70px 70px 1fr 90px 90px 110px;
  padding:12px;font-size:12px;align-items:center
}
.table-head{background:#0e1424;color:#aaa}
.row{border-top:1px solid #1a2035}
.badge{
  background:#1a2035;padding:3px 7px;border-radius:6px;font-size:10px
}
.actions button{
  background:none;border:none;color:#ffcc00;cursor:pointer;margin-right:6px
}

/* ===== MODAL ===== */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;z-index:999
}
.modal-box{
  width:820px;background:#0b0f1a;border:1px solid #1a2035;
  border-radius:14px;overflow:hidden
}
.modal-header{
  padding:14px 16px;background:#0e1424;display:flex;justify-content:space-between
}
.modal-body{padding:16px}
.modal-footer{
  padding:14px 16px;background:#0e1424;text-align:right
}
.modal-footer button{
  background:#ffcc00;border:none;padding:8px 18px;border-radius:8px;font-weight:600
}

/* ===== FORM ===== */
.form-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px
}
.form-grid input,.form-grid textarea,.form-grid select{
  background:#0e1424;border:1px solid #1a2035;color:#fff;
  padding:8px 10px;border-radius:6px;font-size:12px
}
.form-grid textarea{grid-column:1/4;height:70px;resize:none}
.check{display:flex;gap:6px;align-items:center;font-size:12px}

/* ===== DOWNLOAD ===== */
.download-section{grid-column:1/4;border-top:1px solid #1a2035;padding-top:12px}
.download-host{margin-bottom:14px}
.quality-row{display:flex;gap:8px;margin-top:6px}
.quality-row select,.quality-row input{flex:1}
.add-quality{
  width:38px;background:#0e1424;border:1px solid #1a2035;
  color:#ffcc00;border-radius:6px;cursor:pointer
}
</style>
</head>

<body>

<div class="cms-app">

<!-- SIDEBAR -->
<aside class="cms-sidebar">
  <div class="brand">
    <span>Anime</span><b>Hunt</b>
    <small>CMS</small>
  </div>

  <nav class="cms-menu">

    <!-- CORE -->
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="anime.html">🎬 Anime</a>
    <a href="episodes.html" class="active">📺 Episodes</a>
    <a href="categories.html">🗂 Catagorys</a>
    <a href="banners.html">🖼 Banners</a>
    <a href="homepage.html">🏠 Homepage</a>

    <!-- CONTENT -->
    <a href="downloads.html">📥 Downloads</a>
    <a href="servers.html">🌐 Servers</a>
    <a href="player.html">🎞 Player</a>
    <a href="search.html">🔍 Search</a>

    <!-- DATA & SEO -->
    <a href="seo.html">📈 Seo</a>
    <a href="analytics.html">📊 Analytics</a>
    <a href="performance.html">⚡ Performance</a>

    <!-- SECURITY & DEPLOY -->
    <a href="security.html">🔐 Security</a>
    <a href="deploy-backup.html">🚀 Deploy-backup</a>

    <!-- AI & ADS -->
    <a href="ads.html">📢 Ads</a>
    <a href="ai-brain.html">🧠 Ai Brain</a>

    <!-- LAYOUT CONTROL -->
    <a href="sidebar.html">📌 Sidebar</a>
    <a href="footer.html">🦶 Footer</a>

    <!-- ADMIN / SYSTEM (LAST) -->
    <a href="system-settings.html">⚙ System-settings</a>

  </nav>
</aside>
<!-- MAIN -->
<main class="cms-main">
<header class="cms-header">
  <div>📺 Episode Management</div>
  <button class="add-btn" id="openAddEpisode">➕ Add Episode</button>
</header>

<section class="cms-content">
<div class="episode-table">
  <div class="table-head">
    <span>Anime</span><span>S</span><span>E</span><span>Title</span>
    <span>Servers</span><span>DL</span><span>Actions</span>
  </div>
  <div id="episodeList"></div>
</div>
</section>
</main>
</div>

<!-- MODAL -->
<div class="modal" id="episodeModal">
<div class="modal-box">
<div class="modal-header">
  <h3>Add Episode</h3><span id="closeModal">✕</span>
</div>

<div class="modal-body">
<div class="form-grid">

<input id="animeName" placeholder="Anime Title">
<input id="seasonNo" placeholder="Season">
<input id="episodeNo" placeholder="Episode">
<input id="episodeTitle" placeholder="Episode Title">

<input id="server1" placeholder="Server 1 URL">
<input id="server2" placeholder="Server 2 URL">
<input id="server3" placeholder="Server 3 URL">

<textarea id="description" placeholder="Description"></textarea>

<div class="download-section">

<div class="download-host">
<input class="host-name" placeholder="Host Name (Upload4ever)">
<div class="quality-row">
<select>
  <option>480p</option><option>720p</option><option>1080p</option>
  <option>4K</option><option>ZIP</option>
</select>
<input class="quality-link" placeholder="Download Link">
<button type="button" class="add-quality">＋</button>
</div>
</div>

</div>

<label class="check"><input type="checkbox" id="isOngoing"> Ongoing</label>
<label class="check"><input type="checkbox" id="isFeatured"> Featured</label>

</div>
</div>

<div class="modal-footer">
<button id="saveEpisode">💾 Save Episode</button>
</div>
</div>
</div>

<script>

const API = "https://animehunt-backend.animehunt715.workers.dev/api/admin/episodes"
const AUTH_KEY = "AUTH_TOKEN"

let editId = null

const episodeModal = document.getElementById("episodeModal")
const openAddBtn = document.getElementById("openAddEpisode")
const closeModalBtn = document.getElementById("closeModal")
const saveBtn = document.getElementById("saveEpisode")
const episodeList = document.getElementById("episodeList")

const animeName = document.getElementById("animeName")
const seasonNo = document.getElementById("seasonNo")
const episodeNo = document.getElementById("episodeNo")
const episodeTitle = document.getElementById("episodeTitle")
const description = document.getElementById("description")

const server1 = document.getElementById("server1")
const server2 = document.getElementById("server2")
const server3 = document.getElementById("server3")

const isOngoing = document.getElementById("isOngoing")
const isFeatured = document.getElementById("isFeatured")

/* ===============================
SAFE FETCH
=============================== */
async function apiFetch(url, options={}){

  const token = localStorage.getItem(AUTH_KEY)

  const res = await fetch(url,{
    ...options,
    headers:{
      "Content-Type":"application/json",
      "Authorization": token ? "Bearer "+token : ""
    }
  })

  if(res.status===401){
    localStorage.removeItem(AUTH_KEY)
    location.href="login.html"
    throw new Error("Session expired")
  }

  if(!res.ok){
    const text = await res.text()
    throw new Error(text || "Request failed")
  }

  return res.json()
}

/* ===============================
MODAL
=============================== */

openAddBtn.onclick = ()=>{
  editId=null
  resetForm()
  episodeModal.style.display="flex"
}

closeModalBtn.onclick = ()=>{
  episodeModal.style.display="none"
}

/* ===============================
ADD QUALITY
=============================== */

document.addEventListener("click",e=>{

  if(e.target.classList.contains("add-quality")){

    const row = e.target.closest(".quality-row")
    const clone = row.cloneNode(true)

    clone.querySelector(".quality-link").value=""
    clone.querySelector("select").selectedIndex=0

    row.parentElement.appendChild(clone)

  }

})

/* ===============================
LOAD
=============================== */

async function loadEpisodes(){

  try{

    const data = await apiFetch(API)

    render(data)

  }catch(err){

    console.error(err)

  }

}

/* ===============================
SAVE
=============================== */

saveBtn.onclick = async ()=>{

try{

const anime = animeName.value.trim()

if(!anime) return alert("Anime required")

const servers = [
server1.value.trim(),
server2.value.trim(),
server3.value.trim()
].filter(Boolean)

const downloads=[]

document.querySelectorAll(".download-host").forEach(hostBox=>{

const host = hostBox.querySelector(".host-name").value.trim()

if(!host) return

const links=[]

hostBox.querySelectorAll(".quality-row").forEach(row=>{

const quality = row.querySelector("select").value
const url = row.querySelector(".quality-link").value.trim()

if(url){

links.push({
quality,
url
})

}

})

if(links.length){

downloads.push({
host,
links
})

}

})

const payload={
anime,
season:seasonNo.value.trim(),
episode:episodeNo.value.trim(),
title:episodeTitle.value.trim(),
description:description.value.trim(),
servers,
downloads,
ongoing:isOngoing.checked,
featured:isFeatured.checked
}

if(editId){

await apiFetch(`${API}/${editId}`,{
method:"PATCH",
body:JSON.stringify(payload)
})

}else{

await apiFetch(API,{
method:"POST",
body:JSON.stringify(payload)
})

}

episodeModal.style.display="none"

resetForm()

loadEpisodes()

}catch(err){

alert(err.message)

}

}

/* ===============================
DELETE
=============================== */

window.removeEpisode = async(id)=>{

if(!confirm("Delete episode?")) return

await apiFetch(`${API}/${id}`,{
method:"DELETE"
})

loadEpisodes()

}

/* ===============================
EDIT
=============================== */

window.editEpisode = async(id)=>{

try{

const e = await apiFetch(`${API}/${id}`)

editId=id

resetForm()

animeName.value=e.anime||""
seasonNo.value=e.season||""
episodeNo.value=e.episode||""
episodeTitle.value=e.title||""
description.value=e.description||""

server1.value=e.servers?.[0]||""
server2.value=e.servers?.[1]||""
server3.value=e.servers?.[2]||""

isOngoing.checked=!!e.ongoing
isFeatured.checked=!!e.featured

episodeModal.style.display="flex"

}catch(err){

alert("Load failed")

}

}

/* ===============================
RENDER
=============================== */

function render(list){

episodeList.innerHTML=""

list.forEach(e=>{

const row=document.createElement("div")
row.className="row"

const downloadsCount =
e.downloads?.reduce((t,h)=>t+h.links.length,0) || 0

row.innerHTML=`
<span>${escapeHTML(e.anime)}</span>
<span class="badge">S${escapeHTML(e.season)}</span>
<span class="badge">E${escapeHTML(e.episode)}</span>
<span>${escapeHTML(e.title)}</span>
<span>${e.servers?.length||0}</span>
<span>${downloadsCount}</span>
<span class="actions">
<button onclick="editEpisode('${e.id}')">✏️</button>
<button onclick="removeEpisode('${e.id}')">🗑</button>
</span>
`

episodeList.appendChild(row)

})

}

/* ===============================
ESCAPE
=============================== */

function escapeHTML(str){

return String(str)
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")

}

/* ===============================
RESET
=============================== */

function resetForm(){

animeName.value=""
seasonNo.value=""
episodeNo.value=""
episodeTitle.value=""
description.value=""

server1.value=""
server2.value=""
server3.value=""

isOngoing.checked=false
isFeatured.checked=false

document.querySelector(".download-section").innerHTML=`
<div class="download-host">
<input class="host-name" placeholder="Host Name">
<div class="quality-row">
<select>
<option>480p</option>
<option>720p</option>
<option>1080p</option>
<option>4K</option>
<option>ZIP</option>
</select>
<input class="quality-link" placeholder="Download Link">
<button type="button" class="add-quality">＋</button>
</div>
</div>
`

}

/* INIT */

loadEpisodes()

</script>

</body>
</html>
