<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Login – AnimeHunt CMS</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#070b17;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* LOGIN BOX */
.login-box{
  width:380px;
  background:#0b0f1a;
  border:1px solid #1a2035;
  border-radius:14px;
  padding:26px;
}

.brand{
  text-align:center;
  margin-bottom:22px;
}
.brand span{font-size:22px}
.brand b{color:#ffcc00}
.brand small{
  display:block;
  font-size:12px;
  color:#777;
  margin-top:4px;
}

.form-group{margin-bottom:14px}
.form-group label{
  font-size:12px;
  color:#aaa;
  display:block;
  margin-bottom:6px;
}
.form-group input{
  width:100%;
  padding:10px;
  background:#11162a;
  border:1px solid #1a2035;
  border-radius:8px;
  color:#fff;
}
.form-group input:focus{
  outline:none;
  border-color:#ffcc00;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ffcc00;
  color:#000;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

.msg{
  margin-top:12px;
  font-size:12px;
  text-align:center;
  display:none;
}
.msg.error{color:#ff4d4d}
.msg.success{color:#00ffd5}
</style>
</head>

<body>

<div class="login-box">

  <div class="brand">
    <span>Anime</span><b>Hunt</b>
    <small>Secure CMS Login</small>
  </div>

  <div class="form-group">
    <label>Username</label>
    <input id="username" autocomplete="username">
  </div>

  <div class="form-group">
    <label>Password</label>
    <input id="password" type="password" autocomplete="current-password">
  </div>

  <button id="loginBtn">Login</button>

  <div class="msg error" id="errorMsg"></div>
  <div class="msg success" id="successMsg"></div>

</div>

<script>

/* ===============================
   HTTPS CHECK
================================ */
if(location.protocol !== "https:" && location.hostname !== "localhost"){
  document.body.innerHTML = "Secure connection required.";
}

/* ===============================
   AUTO REDIRECT IF ALREADY LOGGED
================================ */
if(localStorage.getItem("AUTH_TOKEN")){
  location.href="dashboard.html";
}

/* ===============================
   CONFIG
================================ */
const MAX_ATTEMPTS = 5;
const LOCK_TIME = 30000;
const ATTEMPT_KEY = "LOGIN_ATTEMPTS";

let attempts = Number(localStorage.getItem(ATTEMPT_KEY) || 0);
let locked = false;

/* ===============================
   SAFE FETCH WITH TIMEOUT
================================ */
async function safeFetch(url, options = {}, timeout = 8000){

  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeout);

  try{
    const res = await fetch(url,{
      ...options,
      signal: controller.signal
    });

    clearTimeout(id);
    return res;
  }catch(err){
    clearTimeout(id);
    throw err;
  }
}

/* ===============================
   LOGIN HANDLER
================================ */
loginBtn.onclick = async () => {

  if (locked) return;

  const user = username.value.trim();
  const pass = password.value;

  errorMsg.style.display = successMsg.style.display = "none";

  if (!user || !pass) {
    showError("Missing credentials");
    return;
  }

  if (attempts >= MAX_ATTEMPTS) {
    lockUser();
    return;
  }

  attempts++;
  localStorage.setItem(ATTEMPT_KEY, attempts);

  loginBtn.disabled = true;

  try {

    const res = await safeFetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: user,
        password: pass
      })
    });

    if (!res.ok) {
      throw new Error("Invalid");
    }

    const data = await res.json();

    if(!data || !data.tempSession){
      throw new Error("Malformed response");
    }

    // Store temporary session only
    sessionStorage.setItem("TEMP_SESSION", data.tempSession);
    sessionStorage.setItem("LOGIN_USER", user);

    localStorage.removeItem(ATTEMPT_KEY);

    successMsg.innerText = "Verification required";
    successMsg.style.display = "block";

    setTimeout(()=>{
      location.href="verify.html";
    },800);

  } catch (err) {
    showError("Invalid credentials");
  } finally {
    loginBtn.disabled = false;
  }
};

/* ===============================
   LOCK SYSTEM
================================ */
function lockUser(){
  locked = true;

  showError("Too many attempts. Try again later.");

  setTimeout(()=>{
    locked = false;
    attempts = 0;
    localStorage.removeItem(ATTEMPT_KEY);
  }, LOCK_TIME);
}

/* ===============================
   ERROR DISPLAY
================================ */
function showError(msg){
  errorMsg.innerText = msg;
  errorMsg.style.display = "block";
}

</script>
</body>
</html>
