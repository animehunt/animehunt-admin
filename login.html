<!DOCTYPE html>
<html>
<head>
<title>Admin Login – AnimeHunt</title>
<style>
body{
  background:#060a14;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:system-ui;
}
.box{
  background:#0b0f1a;
  padding:30px;
  border-radius:12px;
  border:1px solid #1a2035;
  width:320px;
}
input{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  background:#0e1424;
  border:1px solid #1a2035;
  color:#fff;
  border-radius:6px;
}
button{
  width:100%;
  padding:10px;
  background:#ffcc00;
  border:none;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
<h3 style="color:#ffcc00">Admin Login</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
<script>
async function login(){

  const username=document.getElementById('username').value.trim()
  const password=document.getElementById('password').value.trim()

  const res=await fetch(
    "https://animehunt-backend.animehunt715.workers.dev/api/admin/login",
    {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:"include",
      body:JSON.stringify({username,password})
    }
  )

  if(!res.ok){
    alert("Invalid credentials")
    return
  }

  location.href="dashboard.html"
}
</script>
</body>
</html>
