<!DOCTYPE html>
<html>
<head>
<title>Download CMS – AnimeHunt</title>

<style>
body{background:#060a14;color:#fff;font-family:system-ui}
.cms-app{display:flex;min-height:100vh}
.cms-sidebar{width:230px;background:#070b16;border-right:1px solid #1a2035}
.brand{padding:16px;font-size:20px}
.brand b{color:#ffcc00}
.cms-menu a{display:block;padding:10px 18px;color:#ccc;text-decoration:none}
.cms-menu a.active,.cms-menu a:hover{background:#0e1424;color:#ffcc00}

.cms-main{flex:1}
.cms-header{display:flex;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #1a2035}
.add-btn{background:#ffcc00;border:none;padding:8px 16px;border-radius:8px;font-weight:600}

.cms-content{padding:20px}

/* TABLE */
.downloads-table{background:#0b0f1a;border:1px solid #1a2035;border-radius:12px;overflow:hidden}
.downloads-head,.row{
  display:grid;
  grid-template-columns:1.2fr 80px 80px 1fr 80px 1fr 80px;
  padding:12px;font-size:12px;align-items:center
}
.downloads-head{background:#0e1424;color:#aaa}
.row{border-top:1px solid #1a2035}

.badge{background:#1a2035;padding:3px 7px;border-radius:6px;font-size:10px}
.actions button{background:none;border:none;color:#ffcc00;cursor:pointer}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.modal-box{width:820px;background:#0b0f1a;border:1px solid #1a2035;border-radius:14px}
.modal-header,.modal-footer{padding:14px 16px;background:#0e1424}
.modal-header{display:flex;justify-content:space-between}
.modal-body{padding:16px}

.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-grid input,.form-grid select{
  background:#0e1424;border:1px solid #1a2035;color:#fff;
  padding:8px;border-radius:6px;font-size:12px
}

.download-section{grid-column:1/4;border-top:1px solid #1a2035;padding-top:12px}
.download-host{margin-bottom:14px}
.quality-row{display:flex;gap:8px;margin-top:6px}
.quality-row select,.quality-row input{flex:1}
.add-quality{
  width:38px;background:#0e1424;border:1px solid #1a2035;
  color:#ffcc00;border-radius:6px;cursor:pointer
}
</style>
</head>

<body>

<div class="cms-app">

<aside class="cms-sidebar">
  <div class="brand">
    <span>Anime</span><b>Hunt</b>
    <small>CMS</small>
  </div>

  <nav class="cms-menu">

    <!-- CORE -->
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="anime.html">🎬 Anime</a>
    <a href="episodes.html">📺 Episodes</a>
    <a href="categories.html">🗂 Catagorys</a>
    <a href="banners.html">🖼 Banners</a>
    <a href="homepage.html">🏠 Homepage</a>

    <!-- CONTENT -->
    <a href="downloads.html" class="active">📥 Downloads</a>
    <a href="servers.html">🌐 Servers</a>
    <a href="player.html">🎞 Player</a>
    <a href="search.html">🔍 Search</a>

    <!-- DATA & SEO -->
    <a href="seo.html">📈 Seo</a>
    <a href="analytics.html">📊 Analytics</a>
    <a href="performance.html">⚡ Performance</a>

    <!-- SECURITY & DEPLOY -->
    <a href="security.html">🔐 Security</a>
    <a href="deploy-backup.html">🚀 Deploy-backup</a>

    <!-- AI & ADS -->
    <a href="ads.html">📢 Ads</a>
    <a href="ai-brain.html">🧠 Ai Brain</a>

    <!-- LAYOUT CONTROL -->
    <a href="sidebar.html">📌 Sidebar</a>
    <a href="footer.html">🦶 Footer</a>

    <!-- ADMIN / SYSTEM (LAST) -->
    <a href="system-settings.html">⚙ System-settings</a>

  </nav>
</aside>

<main class="cms-main">

<header class="cms-header">
  <div>📥 Download Manager</div>
  <button class="add-btn" id="openModal">➕ Add Download</button>
</header>

<section class="cms-content">
<div class="downloads-table">
  <div class="downloads-head">
    <span>Anime</span><span>S</span><span>E</span>
    <span>Host</span><span>Quality</span><span>Link</span><span>Actions</span>
  </div>
  <div id="downloadList"></div>
</div>
</section>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="downloadModal">
<div class="modal-box">

<div class="modal-header">
  <h3>Add Download</h3>
  <span id="closeModal">✕</span>
</div>

<div class="modal-body">
<div class="form-grid">

<input id="anime" placeholder="Anime Name">
<input id="season" placeholder="Season">
<input id="episode" placeholder="Episode">

<div class="download-section">

<div class="download-host">
<input class="host-name" placeholder="Host Name (Upload4ever)">
<div class="quality-row">
<select>
  <option>480p</option>
  <option>720p</option>
  <option>1080p</option>
  <option>4K</option>
  <option>ZIP</option>
</select>
<input class="quality-link" placeholder="Download Link">
<button type="button" class="add-quality">＋</button>
</div>
</div>

</div>
</div>
</div>

<div class="modal-footer">
<button id="saveDownload">💾 Save</button>
</div>

</div>
</div>



  <script>
/* ============================================================
   ANIMEHUNT CMS - DOWNLOAD MANAGER (FIXED)
   ============================================================ */

const API = "https://animehunt-backend.animehunt715.workers.dev/api/admin/downloads";
const downloadList = document.getElementById("downloadList");
const modal = document.getElementById("downloadModal");
const saveBtn = document.getElementById("saveDownload");
const section = document.querySelector(".download-section");

/** 1. Load Data **/
async function loadDownloads() {
    downloadList.innerHTML = "<div style='padding:20px; color:#ffcc00'>Loading links...</div>";
    try {
        const res = await fetch(API);
        const data = await res.json();
        render(data);
    } catch (e) { downloadList.innerHTML = "Error loading data"; }
}

function render(data) {
    downloadList.innerHTML = data.length ? "" : "<div style='padding:20px; color:#666'>No links found.</div>";
    data.forEach(d => {
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
            <span style="font-weight:600">${d.anime}</span>
            <span>S${d.season}</span>
            <span>E${d.episode}</span>
            <span class="badge">${d.host}</span>
            <span style="color:#ffcc00">${d.quality}</span>
            <span style="color:#888; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${d.link}</span>
            <div class="actions">
                <button onclick="deleteLink('${d.id}')">🗑</button>
            </div>
        `;
        downloadList.appendChild(row);
    });
}

/** 2. Dynamic UI Logic **/
function addHostBlock() {
    const div = document.createElement("div");
    div.className = "download-host-card";
    div.style.background = "#0e1424";
    div.style.padding = "12px";
    div.style.borderRadius = "8px";
    div.style.marginBottom = "10px";
    div.style.border = "1px solid #1a2035";

    div.innerHTML = `
        <div style="display:flex; gap:10px; margin-bottom:10px">
            <input class="host-name" placeholder="Host Name (e.g. Terabox)" style="flex:1; background:#0b0f1a; border:1px solid #1a2035; color:#fff; padding:6px; border-radius:4px">
            <button type="button" onclick="this.parentElement.parentElement.remove()" style="color:#ff4d4d; border:none; background:none; cursor:pointer">✕</button>
        </div>
        <div class="quality-container"></div>
        <button type="button" onclick="addQualityRow(this)" style="width:100%; padding:5px; background:none; border:1px dashed #444; color:#aaa; cursor:pointer; font-size:11px">＋ Add Link</button>
    `;
    section.appendChild(div);
    addQualityRow(div.querySelector("button")); // Add first link row automatically
}

function addQualityRow(btn) {
    const container = btn.previousElementSibling;
    const row = document.createElement("div");
    row.className = "quality-row";
    row.style.display = "flex";
    row.style.gap = "5px";
    row.style.marginTop = "5px";
    row.innerHTML = `
        <select class="q-val" style="background:#0b0f1a; color:#fff; border:1px solid #1a2035; border-radius:4px">
            <option>480p</option><option selected>720p</option>
            <option>1080p</option><option>4K</option><option>ZIP</option>
        </select>
        <input class="quality-link" placeholder="Download Link" style="flex:1; background:#0b0f1a; border:1px solid #1a2035; color:#fff; padding:6px; border-radius:4px">
        <button type="button" onclick="this.parentElement.remove()" style="color:#666; border:none; background:none; cursor:pointer">✕</button>
    `;
    container.appendChild(row);
}

/** 3. Save Bulk Data **/
saveBtn.onclick = async () => {
    const anime = document.getElementById("anime").value.trim();
    const season = document.getElementById("season").value.trim() || "1";
    const episode = document.getElementById("episode").value.trim();

    if (!anime || !episode) return alert("Anime Name and Episode are required!");

    const payload = [];
    document.querySelectorAll(".download-host-card").forEach(card => {
        const host = card.querySelector(".host-name").value.trim();
        if (!host) return;

        card.querySelectorAll(".quality-row").forEach(row => {
            const quality = row.querySelector(".q-val").value;
            const link = row.querySelector(".quality-link").value.trim();
            if (link) {
                payload.push({ anime, season, episode, host, quality, link });
            }
        });
    });

    if (payload.length === 0) return alert("Please add at least one valid download link.");

    try {
        saveBtn.innerText = "Processing...";
        saveBtn.disabled = true;

        const res = await fetch(`${API}/bulk`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            closeModal();
            loadDownloads();
        } else {
            alert("Failed to save links");
        }
    } catch (e) { alert("Server error"); }
    finally {
        saveBtn.innerText = "💾 Save";
        saveBtn.disabled = false;
    }
};

/** 4. Actions & Modal Controls **/
window.deleteLink = async (id) => {
    if (!confirm("Delete this link?")) return;
    await fetch(`${API}/${id}`, { method: "DELETE" });
    loadDownloads();
};

document.getElementById("openModal").onclick = () => {
    document.getElementById("anime").value = "";
    document.getElementById("episode").value = "";
    section.innerHTML = ""; // Clear previous host blocks
    addHostBlock(); // Start with one fresh block
    modal.style.display = "flex";
};

document.getElementById("closeModal").onclick = closeModal;
function closeModal() { modal.style.display = "none"; }

// Initial Load
loadDownloads();
    
  </script>

    
</body>
</html>
