<!DOCTYPE html>
<html>
<head>
<title>Download CMS – AnimeHunt</title>

<style>
body{background:#060a14;color:#fff;font-family:system-ui;margin:0}
.cms-app{display:flex;min-height:100vh}
.cms-sidebar{width:230px;background:#070b16;border-right:1px solid #1a2035}
.brand{padding:16px;font-size:20px}
.brand b{color:#ffcc00}
.cms-menu a{display:block;padding:10px 18px;color:#ccc;text-decoration:none}
.cms-menu a.active,.cms-menu a:hover{background:#0e1424;color:#ffcc00}

.cms-main{flex:1}
.cms-header{display:flex;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #1a2035}
.add-btn{background:#ffcc00;border:none;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer}

.cms-content{padding:20px}

.downloads-head,.row{
display:grid;
grid-template-columns:30px 1fr 60px 60px 1fr 80px 1fr 160px;
padding:10px;
}
.downloads-head{background:#0e1424}
.row{border-top:1px solid #1a2035}

.badge{background:#1a2035;padding:3px 6px;border-radius:5px}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.modal-box{width:900px;background:#0b0f1a;border-radius:12px;padding:15px}
input,select{background:#111;border:1px solid #333;color:#fff;padding:6px;border-radius:5px}
button{cursor:pointer}
</style>
</head>

<body>

<div class="cms-app">

<aside class="cms-sidebar">
<div class="brand">Anime<b>Hunt</b></div>
<nav class="cms-menu">
<a href="dashboard.html">🏠 Dashboard</a>
<a href="anime.html">🎬 Anime</a>
<a href="episodes.html">📺 Episodes</a>
<a href="categories.html">🗂 Catagorys</a>
<a href="banners.html">🖼 Banners</a>
<a href="homepage.html">🏠 Homepage</a>
<a href="downloads.html" class="active">📥 Downloads</a>
<a href="servers.html">🌐 Servers</a>
<a href="player.html">🎞 Player</a>
<a href="search.html">🔍 Search</a>
<a href="seo.html">📈 Seo</a>
<a href="analytics.html">📊 Analytics</a>
<a href="performance.html">⚡ Performance</a>
<a href="security.html">🔐 Security</a>
<a href="deploy-backup.html">🚀 Deploy-backup</a>
<a href="ads.html">📢 Ads</a>
<a href="ai-brain.html">🧠 Ai Brain</a>
<a href="sidebar.html">📌 Sidebar</a>
<a href="footer.html">🦶 Footer</a>
<a href="system-settings.html">⚙ System-settings</a>
</nav>
</aside>

<main class="cms-main">

<header class="cms-header">
<div>📥 Download Manager</div>
<button class="add-btn" onclick="openModal()">➕ Add</button>
</header>

<section class="cms-content">

<div style="margin-bottom:10px">
<button onclick="bulkDelete()">🗑 Bulk Delete</button>
<button onclick="bulkEdit()">✏️ Bulk Edit</button>
</div>

<div class="downloads-head">
<span><input type="checkbox" id="selectAll"></span>
<span>Anime</span><span>S</span><span>E</span>
<span>Host</span><span>Q</span><span>Link</span><span>Actions</span>
</div>

<div id="downloadList"></div>

</section>

</main>
</div>

<!-- ADD MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<input id="anime" placeholder="Anime">
<input id="season" placeholder="Season">
<input id="episode" placeholder="Episode">

<div id="hosts"></div>

<button onclick="addHost()">+ Host</button>
<button onclick="save()">Save</button>

</div>
</div>

<!-- EDIT MODAL -->
<div class="modal" id="editModal">
<div class="modal-box">

<input id="editAnime">
<input id="editSeason">
<input id="editEpisode">
<input id="editHost">
<input id="editQuality">
<input id="editLink">

<select id="editType">
<option value="internal">internal</option>
<option value="external">external</option>
</select>

<select id="editRoute">
<option value="go">go</option>
<option value="direct">direct</option>
</select>

<button onclick="updateDownload()">Update</button>

</div>
</div>

<script>
const API="https://animehunt-backend.animehunt715.workers.dev/api/admin/downloads"
const TOKEN=localStorage.getItem("AUTH_TOKEN")

if(!TOKEN) location.href="login.html"

let HOSTS=JSON.parse(localStorage.getItem("HOSTS")||"[]")
let EDIT_ID=null

async function shortlink(url){
return url
}

/* LOAD */
async function loadDownloads(){

const list=document.getElementById("downloadList")
list.innerHTML="Loading..."

const res=await fetch(API,{headers:{Authorization:"Bearer "+TOKEN}})
const data=await res.json()

list.innerHTML=""

data.forEach(d=>{
list.innerHTML+=`
<div class="row">
<span><input type="checkbox" class="sel" value="${d.id}"></span>
<span>${d.anime}</span>
<span>${d.season}</span>
<span>${d.episode}</span>
<span class="badge">${d.host}</span>
<span>${d.quality}</span>
<span><a href="/go/${d.id}" target="_blank">${d.link}</a></span>
<span>
<button onclick="edit('${d.id}')">✏️</button>
<button onclick="deleteLink('${d.id}')">🗑</button>
</span>
</div>
`
})

}

/* ADD HOST */
function addHost(){
const div=document.createElement("div")
div.innerHTML=`
<input class="host" placeholder="Host">
<input class="quality" placeholder="720p">
<input class="link" placeholder="link">
`
document.getElementById("hosts").appendChild(div)
}

/* SAVE */
async function save(){

const anime=document.getElementById("anime").value
const season=document.getElementById("season").value||1
const episode=document.getElementById("episode").value

if(!anime || !episode){
alert("Anime & Episode required")
return
}

const payload=[]
const cards=document.querySelectorAll("#hosts div")

for(const card of cards){

const host=card.querySelector(".host").value
const q=card.querySelector(".quality").value
const raw=card.querySelector(".link").value

if(!host || !raw) continue

const link=await shortlink(raw)

payload.push({anime,season,episode,host,quality:q,link})

}

await fetch(API+"/bulk",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+TOKEN
},
body:JSON.stringify(payload)
})

closeModal()
loadDownloads()
}

/* DELETE */
async function deleteLink(id){
await fetch(API+"/"+id,{method:"DELETE",headers:{Authorization:"Bearer "+TOKEN}})
loadDownloads()
}

/* BULK */
async function bulkDelete(){
const ids=[...document.querySelectorAll(".sel:checked")].map(i=>i.value)
for(const id of ids) await deleteLink(id)
}

async function bulkEdit(){
const host=prompt("Host?")
const ids=[...document.querySelectorAll(".sel:checked")].map(i=>i.value)

for(const id of ids){
await fetch(API+"/update/"+id,{
method:"PUT",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+TOKEN
},
body:JSON.stringify({host})
})
}

loadDownloads()
}

/* EDIT */
async function edit(id){

EDIT_ID=id

const res=await fetch(API,{headers:{Authorization:"Bearer "+TOKEN}})
const data=await res.json()

const d=data.find(x=>x.id==id)

editAnime.value=d.anime
editSeason.value=d.season
editEpisode.value=d.episode
editHost.value=d.host
editQuality.value=d.quality
editLink.value=d.link

document.getElementById("editModal").style.display="flex"
}

/* UPDATE */
async function updateDownload(){

await fetch(API+"/update/"+EDIT_ID,{
method:"PUT",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+TOKEN
},
body:JSON.stringify({
anime:editAnime.value,
season:editSeason.value,
episode:editEpisode.value,
host:editHost.value,
quality:editQuality.value,
link:editLink.value,
type:editType.value,
route:editRoute.value
})
})

document.getElementById("editModal").style.display="none"
loadDownloads()
}

/* MODAL */
function openModal(){
document.getElementById("modal").style.display="flex"
document.getElementById("hosts").innerHTML=""
addHost()
}

function closeModal(){
document.getElementById("modal").style.display="none"
}

/* SELECT ALL */
setTimeout(()=>{
document.getElementById("selectAll").onclick=(e)=>{
document.querySelectorAll(".sel").forEach(c=>c.checked=e.target.checked)
}
},500)

/* CLOSE MODAL */
window.onclick=function(e){
if(e.target.classList.contains("modal")){
e.target.style.display="none"
}
}

loadDownloads()
</script>

</body>
</html>
