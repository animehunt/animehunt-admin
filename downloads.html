<!DOCTYPE html>
<html>
<head>
<title>Download CMS – AnimeHunt</title>

<style>
body{background:#060a14;color:#fff;font-family:system-ui}
.cms-app{display:flex;min-height:100vh}
.cms-sidebar{width:230px;background:#070b16;border-right:1px solid #1a2035}
.brand{padding:16px;font-size:20px}
.brand b{color:#ffcc00}
.cms-menu a{display:block;padding:10px 18px;color:#ccc;text-decoration:none}
.cms-menu a.active,.cms-menu a:hover{background:#0e1424;color:#ffcc00}

.cms-main{flex:1}
.cms-header{display:flex;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #1a2035}
.add-btn{background:#ffcc00;border:none;padding:8px 16px;border-radius:8px;font-weight:600}

.cms-content{padding:20px}

/* TABLE */
.downloads-table{background:#0b0f1a;border:1px solid #1a2035;border-radius:12px;overflow:hidden}
.downloads-head,.row{
  display:grid;
  grid-template-columns:1.2fr 80px 80px 1fr 80px 1fr 80px;
  padding:12px;font-size:12px;align-items:center
}
.downloads-head{background:#0e1424;color:#aaa}
.row{border-top:1px solid #1a2035}

.badge{background:#1a2035;padding:3px 7px;border-radius:6px;font-size:10px}
.actions button{background:none;border:none;color:#ffcc00;cursor:pointer}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.modal-box{width:820px;background:#0b0f1a;border:1px solid #1a2035;border-radius:14px}
.modal-header,.modal-footer{padding:14px 16px;background:#0e1424}
.modal-header{display:flex;justify-content:space-between}
.modal-body{padding:16px}

.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-grid input,.form-grid select{
  background:#0e1424;border:1px solid #1a2035;color:#fff;
  padding:8px;border-radius:6px;font-size:12px
}

.download-section{grid-column:1/4;border-top:1px solid #1a2035;padding-top:12px}
.download-host{margin-bottom:14px}
.quality-row{display:flex;gap:8px;margin-top:6px}
.quality-row select,.quality-row input{flex:1}
.add-quality{
  width:38px;background:#0e1424;border:1px solid #1a2035;
  color:#ffcc00;border-radius:6px;cursor:pointer
}
</style>
</head>

<body>

<div class="cms-app">

<aside class="cms-sidebar">
  <div class="brand">
    <span>Anime</span><b>Hunt</b>
    <small>CMS</small>
  </div>

  <nav class="cms-menu">

    <!-- CORE -->
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="anime.html">🎬 Anime</a>
    <a href="episodes.html">📺 Episodes</a>
    <a href="categories.html">🗂 Catagorys</a>
    <a href="banners.html">🖼 Banners</a>
    <a href="homepage.html">🏠 Homepage</a>

    <!-- CONTENT -->
    <a href="downloads.html" class="active">📥 Downloads</a>
    <a href="servers.html">🌐 Servers</a>
    <a href="player.html">🎞 Player</a>
    <a href="search.html">🔍 Search</a>

    <!-- DATA & SEO -->
    <a href="seo.html">📈 Seo</a>
    <a href="analytics.html">📊 Analytics</a>
    <a href="performance.html">⚡ Performance</a>

    <!-- SECURITY & DEPLOY -->
    <a href="security.html">🔐 Security</a>
    <a href="deploy-backup.html">🚀 Deploy-backup</a>

    <!-- AI & ADS -->
    <a href="ads.html">📢 Ads</a>
    <a href="ai-brain.html">🧠 Ai Brain</a>

    <!-- LAYOUT CONTROL -->
    <a href="sidebar.html">📌 Sidebar</a>
    <a href="footer.html">🦶 Footer</a>

    <!-- ADMIN / SYSTEM (LAST) -->
    <a href="system-settings.html">⚙ System-settings</a>

  </nav>
</aside>

<main class="cms-main">

<header class="cms-header">
  <div>📥 Download Manager</div>
  <button class="add-btn" id="openModal">➕ Add Download</button>
</header>

<section class="cms-content">
<div class="downloads-table">
  <div class="downloads-head">
    <span>Anime</span><span>S</span><span>E</span>
    <span>Host</span><span>Quality</span><span>Link</span><span>Actions</span>
  </div>
  <div id="downloadList"></div>
</div>
</section>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="downloadModal">
<div class="modal-box">

<div class="modal-header">
  <h3>Add Download</h3>
  <span id="closeModal">✕</span>
</div>

<div class="modal-body">
<div class="form-grid">

<input id="anime" placeholder="Anime Name">
<input id="season" placeholder="Season">
<input id="episode" placeholder="Episode">

<div class="download-section">

<div class="download-host">
<input class="host-name" placeholder="Host Name (Upload4ever)">
<div class="quality-row">
<select>
  <option>480p</option>
  <option>720p</option>
  <option>1080p</option>
  <option>4K</option>
  <option>ZIP</option>
</select>
<input class="quality-link" placeholder="Download Link">
<button type="button" class="add-quality">＋</button>
</div>
</div>

</div>
</div>
</div>

<div class="modal-footer">
<button id="saveDownload">💾 Save</button>
</div>

</div>
</div>



  <script>

/* ======================================
   CONFIG
====================================== */
const API = "/api/admin/download"
const TOKEN_KEY = "AUTH_TOKEN"

/* ======================================
   SAFE FETCH
====================================== */
async function apiFetch(url, options = {}) {

  const token = localStorage.getItem(TOKEN_KEY)

  const res = await fetch(url, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      "Authorization": token ? "Bearer " + token : "",
      ...options.headers
    }
  })

  if (res.status === 401) {
    localStorage.removeItem(TOKEN_KEY)
    location.href = "login.html"
    return
  }

  if (!res.ok) {
    const text = await res.text()
    throw new Error(text || "Request failed")
  }

  return res.json()
}

/* ======================================
   ELEMENTS
====================================== */
const modal = document.getElementById("downloadModal")
const openBtn = document.getElementById("openModal")
const closeBtn = document.getElementById("closeModal")
const saveBtn = document.getElementById("saveDownload")
const listEl = document.getElementById("downloadList")

/* ======================================
   MODAL CONTROL
====================================== */
openBtn.onclick = () => modal.style.display = "flex"
closeBtn.onclick = () => closeModal()

function closeModal(){
  modal.style.display = "none"
  resetForm()
}

/* ======================================
   ADD QUALITY ROW (SAFE)
====================================== */
document.addEventListener("click", e => {

  if (!e.target.classList.contains("add-quality")) return

  const hostBox = e.target.closest(".download-host")
  const template = hostBox.querySelector(".quality-row")
  const clone = template.cloneNode(true)

  clone.querySelector(".quality-link").value = ""
  clone.querySelector("select").selectedIndex = 0

  hostBox.appendChild(clone)
})

/* ======================================
   LOAD DOWNLOADS
====================================== */
let downloads = []

async function loadDownloads() {

  try {
    downloads = await apiFetch(API)
    render()
  } catch (err) {
    console.error(err)
  }
}

/* ======================================
   SAVE BULK
====================================== */
saveBtn.onclick = async () => {

  try {

    const anime = document.getElementById("anime").value.trim()
    const season = document.getElementById("season").value.trim()
    const episode = document.getElementById("episode").value.trim()

    if (!anime) {
      alert("Anime name required")
      return
    }

    const payload = []

    document.querySelectorAll(".download-host").forEach(hostBox => {

      const host = hostBox.querySelector(".host-name").value.trim()
      if (!host) return

      hostBox.querySelectorAll(".quality-row").forEach(row => {

        const quality = row.querySelector("select").value
        const link = row.querySelector(".quality-link").value.trim()

        if (!link) return

        payload.push({
          anime,
          season,
          episode,
          host,
          quality,
          link
        })
      })
    })

    if (!payload.length) {
      alert("No valid download links found")
      return
    }

    saveBtn.disabled = true
    saveBtn.textContent = "Saving..."

    await apiFetch(`${API}/bulk`, {
      method: "POST",
      body: JSON.stringify(payload)
    })

    closeModal()
    loadDownloads()

  } catch (err) {
    alert("Save failed")
  } finally {
    saveBtn.disabled = false
    saveBtn.textContent = "💾 Save"
  }
}

/* ======================================
   DELETE
====================================== */
async function removeDownload(id) {

  if (!confirm("Delete download?")) return

  try {
    await apiFetch(`${API}/${id}`, { method: "DELETE" })
    loadDownloads()
  } catch (err) {
    alert("Delete failed")
  }
}

/* ======================================
   RENDER SAFE
====================================== */
function render() {

  listEl.innerHTML = ""

  if (!downloads.length) {
    listEl.innerHTML =
      "<div style='padding:20px;color:#888'>No downloads found</div>"
    return
  }

  downloads.forEach(d => {

    const row = document.createElement("div")
    row.className = "row"

    row.innerHTML = `
      <span>${escapeHTML(d.anime)}</span>
      <span class="badge">S${escapeHTML(d.season || "-")}</span>
      <span class="badge">E${escapeHTML(d.episode || "-")}</span>
      <span>${escapeHTML(d.host)}</span>
      <span class="badge">${escapeHTML(d.quality)}</span>
      <span>
        <a href="${escapeHTML(d.link)}" target="_blank" rel="noopener">
          Open
        </a>
      </span>
      <span class="actions">
        <button data-id="${d.id}">🗑</button>
      </span>
    `

    row.querySelector("button")
       .addEventListener("click", () => removeDownload(d.id))

    listEl.appendChild(row)
  })
}

/* ======================================
   ESCAPE HTML
====================================== */
function escapeHTML(str) {
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
}

/* ======================================
   RESET FORM
====================================== */
function resetForm() {

  document.getElementById("anime").value = ""
  document.getElementById("season").value = ""
  document.getElementById("episode").value = ""

  const hosts = document.querySelectorAll(".download-host")

  hosts.forEach((box, i) => {

    if (i > 0) box.remove()

    box.querySelector(".host-name").value = ""

    const rows = box.querySelectorAll(".quality-row")

    rows.forEach((row, j) => {
      if (j > 0) row.remove()
      row.querySelector(".quality-link").value = ""
      row.querySelector("select").selectedIndex = 0
    })
  })
}

/* INIT */
loadDownloads()

  </script>

    
</body>
</html>
