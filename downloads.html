<!DOCTYPE html>
<html>
<head>
<title>Download CMS – AnimeHunt</title>

<style>
body{background:#060a14;color:#fff;font-family:system-ui;margin:0}
.cms-app{display:flex;min-height:100vh}
.cms-sidebar{width:230px;background:#070b16;border-right:1px solid #1a2035}
.brand{padding:16px;font-size:20px}
.brand b{color:#ffcc00}
.cms-menu a{display:block;padding:10px 18px;color:#ccc;text-decoration:none}
.cms-menu a.active,.cms-menu a:hover{background:#0e1424;color:#ffcc00}

.cms-main{flex:1}
.cms-header{display:flex;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #1a2035}
.add-btn{background:#ffcc00;border:none;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer}

.cms-content{padding:20px}

/* TABLE */
.downloads-table{background:#0b0f1a;border:1px solid #1a2035;border-radius:12px;overflow:hidden}
.downloads-head,.row{
display:grid;
grid-template-columns:1.2fr 80px 80px 1fr 80px 1fr 80px;
padding:12px;font-size:12px;align-items:center
}
.downloads-head{background:#0e1424;color:#aaa}
.row{border-top:1px solid #1a2035}

.badge{background:#1a2035;padding:3px 7px;border-radius:6px;font-size:10px}
.actions button{background:none;border:none;color:#ffcc00;cursor:pointer}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.modal-box{width:900px;background:#0b0f1a;border:1px solid #1a2035;border-radius:14px}
.modal-header,.modal-footer{padding:14px 16px;background:#0e1424}
.modal-header{display:flex;justify-content:space-between}
.modal-body{padding:16px}

.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-grid input,.form-grid select{
background:#0e1424;border:1px solid #1a2035;color:#fff;
padding:8px;border-radius:6px;font-size:12px
}

.download-section{grid-column:1/4;border-top:1px solid #1a2035;padding-top:12px}

/* HOST CARD */
.download-host-card{
background:#0e1424;
padding:12px;
border-radius:8px;
margin-bottom:12px;
border:1px solid #1a2035;
}

.host-top{
display:flex;
gap:8px;
margin-bottom:8px;
}

.host-top select,
.host-top input{
flex:1;
}

.quality-row{
display:flex;
gap:8px;
margin-top:6px
}

.quality-row select,.quality-row input{flex:1}

.small-btn{
background:#111;
border:1px solid #333;
color:#ffcc00;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

.add-host-btn{
margin-top:10px;
background:#0e1424;
border:1px dashed #333;
color:#ffcc00;
padding:8px;
border-radius:6px;
cursor:pointer;
width:100%;
}
</style>
</head>

<body>

<div class="cms-app">

<aside class="cms-sidebar">
<div class="brand">
<span>Anime</span><b>Hunt</b>
<small>CMS</small>
</div>

<nav class="cms-menu">

<a href="dashboard.html">🏠 Dashboard</a>
<a href="anime.html">🎬 Anime</a>
<a href="episodes.html">📺 Episodes</a>
<a href="categories.html">🗂 Catagorys</a>
<a href="banners.html">🖼 Banners</a>
<a href="homepage.html">🏠 Homepage</a>

<a href="downloads.html" class="active">📥 Downloads</a>
<a href="servers.html">🌐 Servers</a>
<a href="player.html">🎞 Player</a>
<a href="search.html">🔍 Search</a>

<a href="seo.html">📈 Seo</a>
<a href="analytics.html">📊 Analytics</a>
<a href="performance.html">⚡ Performance</a>

<a href="security.html">🔐 Security</a>
<a href="deploy-backup.html">🚀 Deploy-backup</a>

<a href="ads.html">📢 Ads</a>
<a href="ai-brain.html">🧠 Ai Brain</a>

<a href="sidebar.html">📌 Sidebar</a>
<a href="footer.html">🦶 Footer</a>

<a href="system-settings.html">⚙ System-settings</a>

</nav>
</aside>

<main class="cms-main">

<header class="cms-header">
<div>📥 Download Manager</div>
<button class="add-btn" id="openModal">➕ Add Download</button>
</header>

<section class="cms-content">
<div class="downloads-table">
<div class="downloads-head">
<span>Anime</span><span>S</span><span>E</span>
<span>Host</span><span>Quality</span><span>Link</span><span>Actions</span>
</div>
<div id="downloadList"></div>
</div>
</section>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="downloadModal">
<div class="modal-box">

<div class="modal-header">
<h3>Add Download</h3>
<span id="closeModal">✕</span>
</div>

<div class="modal-body">
<div class="form-grid">

<input id="anime" placeholder="Anime Name">
<input id="season" placeholder="Season">
<input id="episode" placeholder="Episode">

<div class="download-section" id="hostSection"></div>

</div>
</div>

<div class="modal-footer">
<button id="saveDownload">💾 Save</button>
</div>

</div>
</div>

<script>

const API="https://animehunt-backend.animehunt715.workers.dev/api/admin/downloads"
const TOKEN=localStorage.getItem("AUTH_TOKEN")

if(!TOKEN) location.href="login.html"

let HOSTS=JSON.parse(localStorage.getItem("HOSTS")||"[]")

function saveHost(h){
if(!HOSTS.includes(h)){
HOSTS.push(h)
localStorage.setItem("HOSTS",JSON.stringify(HOSTS))
}
}

/* LOAD */
async function loadDownloads(){

const list=document.getElementById("downloadList")
list.innerHTML="Loading..."

const res=await fetch(API,{headers:{Authorization:"Bearer "+TOKEN}})
const data=await res.json()

list.innerHTML=""

data.forEach(d=>{
list.innerHTML+=`
<div class="row">
<span>${d.anime}</span>
<span>S${d.season}</span>
<span>E${d.episode}</span>
<span class="badge">${d.host}</span>
<span>${d.quality}</span>
<span>${d.link}</span>
<div class="actions">
<button onclick="deleteLink('${d.id}')">🗑</button>
</div>
</div>
`
})

}

/* HOST BLOCK */
function addHostBlock(){

const div=document.createElement("div")
div.className="download-host-card"

div.innerHTML=`
<div class="host-top">
<select class="host-select"></select>
<input class="host-custom" placeholder="New host (optional)">
</div>

<div class="quality-container"></div>

<div style="margin-top:8px">
<button class="small-btn" onclick="addQualityRow(this)">+ Quality</button>
<button class="small-btn" onclick="this.parentElement.parentElement.remove()">Remove</button>
</div>
`

document.getElementById("hostSection").appendChild(div)

populateHosts(div.querySelector(".host-select"))

addQualityRow(div.querySelector(".small-btn"))
}

/* POPULATE */
function populateHosts(select){
select.innerHTML='<option value="">Select Host</option>'
HOSTS.forEach(h=>{
const o=document.createElement("option")
o.value=h
o.textContent=h
select.appendChild(o)
})
}

/* QUALITY */
function addQualityRow(btn){

const container=btn.closest(".download-host-card").querySelector(".quality-container")

const row=document.createElement("div")
row.className="quality-row"

row.innerHTML=`
<select class="q-val">
<option>480p</option>
<option>720p</option>
<option>1080p</option>
<option>4K</option>
<option>ZIP</option>
</select>

<input class="quality-link" placeholder="Download Link">

<button onclick="this.parentElement.remove()">✕</button>
`

container.appendChild(row)
}

/* SAVE */
document.getElementById("saveDownload").onclick=async()=>{

const anime=document.getElementById("anime").value
const season=document.getElementById("season").value||1
const episode=document.getElementById("episode").value

const payload=[]

document.querySelectorAll(".download-host-card").forEach(card=>{

const hostSel=card.querySelector(".host-select").value
const hostCustom=card.querySelector(".host-custom").value.trim()

const host=hostCustom||hostSel
if(!host)return

saveHost(host)

card.querySelectorAll(".quality-row").forEach(r=>{
const q=r.querySelector(".q-val").value
const link=r.querySelector(".quality-link").value

if(link){
payload.push({anime,season,episode,host,quality:q,link})
}
})

})

await fetch(API+"/bulk",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+TOKEN
},
body:JSON.stringify(payload)
})

closeModal()
loadDownloads()

}

/* DELETE */
async function deleteLink(id){
await fetch(API+"/"+id,{method:"DELETE",headers:{Authorization:"Bearer "+TOKEN}})
loadDownloads()
}

/* MODAL */
document.getElementById("openModal").onclick=()=>{
document.getElementById("downloadModal").style.display="flex"
resetModal()
}

document.getElementById("closeModal").onclick=closeModal

function closeModal(){
document.getElementById("downloadModal").style.display="none"
}

function resetModal(){
document.getElementById("anime").value=""
document.getElementById("season").value=""
document.getElementById("episode").value=""

const sec=document.getElementById("hostSection")
sec.innerHTML=""

addHostBlock()

const btn=document.createElement("button")
btn.className="add-host-btn"
btn.innerText="+ Add Host"
btn.onclick=addHostBlock

sec.appendChild(btn)
}

/* INIT */
loadDownloads()

</script>

</body>
</html>
