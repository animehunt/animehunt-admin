<!DOCTYPE html>
<html>
<head>
<title>Download CMS – AnimeHunt</title>

<style>
body{background:#060a14;color:#fff;font-family:system-ui}
.cms-app{display:flex;min-height:100vh}
.cms-sidebar{width:230px;background:#070b16;border-right:1px solid #1a2035}
.brand{padding:16px;font-size:20px}
.brand b{color:#ffcc00}
.cms-menu a{display:block;padding:10px 18px;color:#ccc;text-decoration:none}
.cms-menu a.active,.cms-menu a:hover{background:#0e1424;color:#ffcc00}

.cms-main{flex:1}
.cms-header{display:flex;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #1a2035}
.add-btn{background:#ffcc00;border:none;padding:8px 16px;border-radius:8px;font-weight:600}

.cms-content{padding:20px}

/* TABLE */
.downloads-table{background:#0b0f1a;border:1px solid #1a2035;border-radius:12px;overflow:hidden}
.downloads-head,.row{
display:grid;
grid-template-columns:1.2fr 80px 80px 1fr 80px 1fr 80px;
padding:12px;font-size:12px;align-items:center
}
.downloads-head{background:#0e1424;color:#aaa}
.row{border-top:1px solid #1a2035}

.badge{background:#1a2035;padding:3px 7px;border-radius:6px;font-size:10px}
.actions button{background:none;border:none;color:#ffcc00;cursor:pointer}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.modal-box{width:900px;background:#0b0f1a;border:1px solid #1a2035;border-radius:14px}
.modal-header,.modal-footer{padding:14px 16px;background:#0e1424}
.modal-header{display:flex;justify-content:space-between}
.modal-body{padding:16px}

.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-grid input{
background:#0e1424;border:1px solid #1a2035;color:#fff;
padding:8px;border-radius:6px;font-size:12px
}

.download-section{margin-top:15px}

/* SOURCE CARD */
.source-card{
border:1px solid #1a2035;
background:#0e1424;
padding:12px;
border-radius:10px;
margin-bottom:12px;
}

.source-header{
display:flex;
gap:10px;
justify-content:space-between;
}

.source-header input{
flex:1;
background:#060a14;
border:1px solid #1a2035;
color:#fff;
padding:6px;
border-radius:6px;
}

.quality-row{
display:flex;
gap:8px;
margin-top:6px;
}

.quality-row select,
.quality-row input{
flex:1;
background:#060a14;
border:1px solid #1a2035;
color:#fff;
padding:6px;
border-radius:6px;
}

.btn-sm{
background:#1a2035;
border:none;
color:#ffcc00;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

.add-source{
margin-top:10px;
background:#ffcc00;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}
</style>
</head>

<body>

<div class="cms-app">

<!-- SIDEBAR -->
<aside class="cms-sidebar">
<div class="brand">
<span>Anime</span><b>Hunt</b>
<small>CMS</small>
</div>

<nav class="cms-menu">

<a href="dashboard.html">🏠 Dashboard</a>
<a href="anime.html">🎬 Anime</a>
<a href="episodes.html">📺 Episodes</a>
<a href="categories.html">🗂 Catagorys</a>
<a href="banners.html">🖼 Banners</a>
<a href="homepage.html">🏠 Homepage</a>

<a href="downloads.html" class="active">📥 Downloads</a>
<a href="servers.html">🌐 Servers</a>
<a href="player.html">🎞 Player</a>
<a href="search.html">🔍 Search</a>

<a href="seo.html">📈 Seo</a>
<a href="analytics.html">📊 Analytics</a>
<a href="performance.html">⚡ Performance</a>

<a href="security.html">🔐 Security</a>
<a href="deploy-backup.html">🚀 Deploy-backup</a>

<a href="ads.html">📢 Ads</a>
<a href="ai-brain.html">🧠 Ai Brain</a>

<a href="sidebar.html">📌 Sidebar</a>
<a href="footer.html">🦶 Footer</a>

<a href="system-settings.html">⚙ System-settings</a>

</nav>
</aside>

<!-- MAIN -->
<main class="cms-main">

<header class="cms-header">
<div>📥 Download Manager</div>
<button class="add-btn" id="openModal">➕ Add Download</button>
</header>

<section class="cms-content">
<div class="downloads-table">
<div class="downloads-head">
<span>Anime</span><span>S</span><span>E</span>
<span>Source</span><span>Quality</span><span>Link</span><span>Actions</span>
</div>
<div id="downloadList"></div>
</div>
</section>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="downloadModal">
<div class="modal-box">

<div class="modal-header">
<h3>Add Download</h3>
<span id="closeModal">✕</span>
</div>

<div class="modal-body">

<div class="form-grid">
<input id="anime" placeholder="Anime Name">
<input id="season" placeholder="Season">
<input id="episode" placeholder="Episode">
</div>

<div class="download-section" id="sourceSection"></div>

<button class="add-source" id="addSourceBtn">+ Add Source</button>

</div>

<div class="modal-footer">
<button id="saveDownload">💾 Save</button>
</div>

</div>
</div>

<script>

const API="https://animehunt-backend.animehunt715.workers.dev/api/admin/downloads"
const TOKEN=localStorage.getItem("AUTH_TOKEN")

if(!TOKEN) location.href="login.html"

const list=document.getElementById("downloadList")
const modal=document.getElementById("downloadModal")
const section=document.getElementById("sourceSection")

async function api(url,method="GET",body=null){
const res=await fetch(url,{
method,
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+TOKEN
},
body:body?JSON.stringify(body):null
})
if(!res.ok) throw new Error()
return res.json()
}

async function loadDownloads(){
list.innerHTML="Loading..."
try{
const data=await api(API)
list.innerHTML=""
data.forEach(d=>{
list.innerHTML+=`
<div class="row">
<span>${d.anime}</span>
<span>S${d.season}</span>
<span>E${d.episode}</span>
<span class="badge">${d.host}</span>
<span style="color:#ffcc00">${d.quality}</span>
<span>${d.link}</span>
<div class="actions">
<button onclick="deleteLink('${d.id}')">🗑</button>
</div>
</div>`
})
}catch{
list.innerHTML="Error loading"
}
}

function addSource(){

const div=document.createElement("div")
div.className="source-card"

div.innerHTML=`
<div class="source-header">
<input class="source-name" placeholder="Source (KnightWolf / Mega / Any)">
<button class="btn-sm" onclick="this.closest('.source-card').remove()">Remove</button>
</div>

<div class="quality-container"></div>

<button class="btn-sm" onclick="addQuality(this)">+ Quality</button>
`

section.appendChild(div)
addQuality(div.querySelector(".btn-sm"))
}

function addQuality(btn){
const container=btn.parentElement.querySelector(".quality-container")

const row=document.createElement("div")
row.className="quality-row"

row.innerHTML=`
<select class="q">
<option>480p</option>
<option>720p</option>
<option>1080p</option>
<option>4K</option>
<option>ZIP</option>
</select>

<input class="l" placeholder="Download Link">

<button onclick="this.parentElement.remove()">✕</button>
`

container.appendChild(row)
}

document.getElementById("saveDownload").onclick=async()=>{

const anime=document.getElementById("anime").value.trim()
const season=document.getElementById("season").value||"1"
const episode=document.getElementById("episode").value.trim()

if(!anime||!episode){
alert("Anime & Episode required")
return
}

const payload=[]

document.querySelectorAll(".source-card").forEach(card=>{
const source=card.querySelector(".source-name").value.trim()
if(!source) return

card.querySelectorAll(".quality-row").forEach(r=>{
const q=r.querySelector(".q").value
const l=r.querySelector(".l").value.trim()

if(l){
payload.push({
anime,
season,
episode,
host:source,
quality:q,
link:l
})
}
})
})

if(!payload.length){
alert("Add at least one link")
return
}

await api(API+"/bulk","POST",payload)

modal.style.display="none"
loadDownloads()
}

window.deleteLink=async(id)=>{
if(confirm("Delete?")){
await api(API+"/"+id,"DELETE")
loadDownloads()
}
}

document.getElementById("openModal").onclick=()=>{
section.innerHTML=""
addSource()
modal.style.display="flex"
}

document.getElementById("closeModal").onclick=()=>{
modal.style.display="none"
}

document.getElementById("addSourceBtn").onclick=addSource

loadDownloads()

</script>

</body>
</html>
