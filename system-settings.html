<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>System Settings – AnimeHunt CMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:#060a14;color:#fff}
.cms-app{display:flex;min-height:100vh}

/* SIDEBAR */
.cms-sidebar{
  width:230px;background:#070b16;border-right:1px solid #1a2035;padding:14px 0
}
.brand{padding:0 18px 14px;font-size:20px}
.brand b{color:#ffcc00}

.cms-menu a{
  display:block;padding:10px 18px;color:#ccc;text-decoration:none
}
.cms-menu a.active,.cms-menu a:hover{
  background:#0e1424;color:#ffcc00
}

/* MAIN */
.cms-main{flex:1}

.cms-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  background:#070b16;
  border-bottom:1px solid #1a2035
}

.save-btn{
  background:#ffcc00;
  border:none;
  padding:8px 18px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer
}

.cms-content{
  padding:30px;
  display:flex;
  justify-content:center
}

/* CARD */
.card{
  width:400px;
  background:#0b0f1a;
  border:1px solid #1a2035;
  border-radius:12px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:16px
}

.card h3{
  color:#ffcc00;
  margin-bottom:10px
}

/* TOGGLE */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:14px
}

select{
  background:#0e1424;
  border:1px solid #1a2035;
  color:#fff;
  padding:6px;
  border-radius:6px
}

.status{
  margin-top:10px;
  font-size:12px;
  color:#4cff4c
}
</style>
</head>

<body>

<div class="cms-app">

<!-- SIDEBAR (UNCHANGED) -->
<aside class="cms-sidebar">
  <div class="brand">Anime<b>Hunt</b></div>

  <nav class="cms-menu">
    <a href="dashboard.html">Dashboard</a>
    <a href="anime.html">Anime</a>
    <a href="episodes.html">Episodes</a>
    <a href="categories.html">Categorys</a>
    <a href="banners.html">Banners</a>
    <a href="homepage.html">Homepage</a>
    <a href="downloads.html">Downloads</a>
    <a href="servers.html">Servers</a>
    <a href="player.html">Player</a>
    <a href="search.html">Search</a>
    <a href="seo.html">Seo</a>
    <a href="analytics.html">Analytics</a>
    <a href="performance.html">Performance</a>
    <a href="security.html">Security</a>
    <a href="deploy-backup.html">Deploy-backup</a>
    <a href="ads.html">Ads</a>
    <a href="ai-brain.html">Ai Brain</a>
    <a href="sidebar.html">Sidebar</a>
    <a href="footer.html">Footer</a>
    <a href="system-settings.html" class="active">System-settings</a>
  </nav>
</aside>

<!-- MAIN -->
<main class="cms-main">

<header class="cms-header">
  <div>⚙ System Settings</div>
  <button class="save-btn" onclick="save()">Save</button>
</header>

<section class="cms-content">

<div class="card">

<h3>Core Controls</h3>

<div class="row">
  <span>System ON/OFF</span>
  <input type="checkbox" id="systemOn">
</div>

<div class="row">
  <span>Maintenance Mode</span>
  <input type="checkbox" id="maintenance">
</div>

<div class="row">
  <span>Site Mode</span>
  <select id="siteMode">
    <option value="public">Public</option>
    <option value="private">Private (Login Required)</option>
  </select>
</div>

<div class="row">
  <span>API Access</span>
  <input type="checkbox" id="apiEnabled">
</div>

<div class="status" id="status">Ready</div>

</div>

</section>
</main>
</div>

<script>

const API="/api/admin/system"
const TOKEN=localStorage.getItem("AUTH_TOKEN")

async function api(method="GET",body=null){

  const res=await fetch(API,{
    method,
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+TOKEN
    },
    body:body?JSON.stringify(body):null
  })

  return res.json()
}

/* LOAD */
async function load(){

  const data=await api()

  document.getElementById("systemOn").checked=!!data.systemOn
  document.getElementById("maintenance").checked=!!data.maintenance
  document.getElementById("siteMode").value=data.siteMode||"public"
  document.getElementById("apiEnabled").checked=!!data.apiEnabled

}

/* SAVE */
async function save(){

  const payload={
    systemOn:document.getElementById("systemOn").checked?1:0,
    maintenance:document.getElementById("maintenance").checked?1:0,
    siteMode:document.getElementById("siteMode").value,
    apiEnabled:document.getElementById("apiEnabled").checked?1:0
  }

  await api("POST",payload)

  document.getElementById("status").innerText="Saved ✅"
}

document.addEventListener("DOMContentLoaded",load)

</script>

</body>
</html>
