<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sidebar CMS – AnimeHunt</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:#060a14;color:#fff}
.cms-app{display:flex;min-height:100vh}

/* ===== ADMIN SIDEBAR (UNCHANGED LINKS) ===== */
.cms-sidebar{
  width:230px;background:#070b16;border-right:1px solid #1a2035;padding:14px 0
}
.brand{padding:0 18px 14px;font-size:20px}
.brand b{color:#ffcc00}
.brand small{display:block;font-size:11px;color:#888}
.cms-menu a{
  display:block;padding:10px 18px;color:#ccc;text-decoration:none;font-size:14px
}
.cms-menu a.active,.cms-menu a:hover{
  background:#0e1424;color:#ffcc00
}

/* ===== MAIN ===== */
.cms-main{flex:1}
.cms-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px;background:#070b16;border-bottom:1px solid #1a2035
}
.add-btn{
  background:#ffcc00;border:none;padding:8px 16px;
  border-radius:8px;font-weight:600;cursor:pointer
}
.cms-content{padding:20px}

/* ===== TABLE ===== */
.table{
  background:#0b0f1a;border:1px solid #1a2035;
  border-radius:12px;overflow:hidden
}
.head,.row{
  display:grid;
  grid-template-columns:40px 1.5fr 1.5fr 80px 80px 160px;
  padding:12px;font-size:12px;align-items:center
}
.head{background:#0e1424;color:#aaa}
.row{border-top:1px solid #1a2035}
.actions button{
  background:none;border:none;color:#ffcc00;
  cursor:pointer;margin-right:6px
}
.badge{
  background:#1a2035;padding:3px 6px;
  border-radius:6px;font-size:10px
}

/* ===== MODAL ===== */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;z-index:9999
}
.modal-box{
  width:760px;background:#0b0f1a;
  border:1px solid #1a2035;border-radius:14px;overflow:hidden
}
.modal-header{
  background:#0e1424;padding:14px 16px;
  display:flex;justify-content:space-between
}
.modal-body{padding:16px}
.modal-footer{
  background:#0e1424;padding:14px 16px;text-align:right
}
.modal-footer button{
  background:#ffcc00;border:none;
  padding:8px 18px;border-radius:8px;font-weight:600
}
.form-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px
}
.form-grid input,.form-grid select{
  background:#0e1424;border:1px solid #1a2035;
  color:#fff;padding:8px;border-radius:6px;font-size:12px
}
.check{display:flex;gap:6px;font-size:12px;align-items:center}
.full{grid-column:1/4}
</style>
</head>

<body>

<div class="cms-app">

<!-- ===== ADMIN MENU (UNCHANGED) ===== -->
<aside class="cms-sidebar">
  <div class="brand">
    <span>Anime</span><b>Hunt</b>
    <small>CMS</small>
  </div>

  <nav class="cms-menu">

    <!-- CORE -->
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="anime.html">🎬 Anime</a>
    <a href="episodes.html">📺 Episodes</a>
    <a href="categories.html">🗂 Catagorys</a>
    <a href="banners.html">🖼 Banners</a>
    <a href="homepage.html">🏠 Homepage</a>

    <!-- CONTENT -->
    <a href="downloads.html">📥 Downloads</a>
    <a href="servers.html">🌐 Servers</a>
    <a href="player.html">🎞 Player</a>
    <a href="search.html">🔍 Search</a>

    <!-- DATA & SEO -->
    <a href="seo.html">📈 Seo</a>
    <a href="analytics.html">📊 Analytics</a>
    <a href="performance.html">⚡ Performance</a>

    <!-- SECURITY & DEPLOY -->
    <a href="security.html">🔐 Security</a>
    <a href="deploy-backup.html">🚀 Deploy-backup</a>

    <!-- AI & ADS -->
    <a href="ads.html">📢 Ads</a>
    <a href="ai-brain.html">🧠 Ai Brain</a>

    <!-- LAYOUT CONTROL -->
    <a href="sidebar.html" class="active">📌 Sidebar</a>
    <a href="footer.html">🦶 Footer</a>

    <!-- ADMIN / SYSTEM (LAST) -->
    <a href="system-settings.html">⚙ System-settings</a>

  </nav>
</aside>

<!-- ===== MAIN ===== -->
<main class="cms-main">

<header class="cms-header">
  <div>📌 Sidebar Manager</div>
  <button class="add-btn" onclick="openModal()">➕ Add Sidebar Item</button>
</header>

<section class="cms-content">

<div class="table">
<div class="head">
  <span>#</span>
  <span>Title</span>
  <span>URL</span>
  <span>Device</span>
  <span>Status</span>
  <span>Actions</span>
</div>
<div id="list"></div>
</div>

</section>
</main>
</div>

<!-- ===== MODAL ===== -->
<div class="modal" id="modal">
<div class="modal-box">
<div class="modal-header">
  <h3>Sidebar Item</h3>
  <span onclick="closeModal()">✕</span>
</div>

<div class="modal-body">
<div class="form-grid">

<input id="title" placeholder="Title (About AnimeHunt)">
<input id="icon" placeholder="Icon / Emoji">
<input id="url" placeholder="Link (/about.html)">

<select id="device">
  <option>All</option>
  <option>Desktop</option>
  <option>Mobile</option>
</select>

<select id="highlight">
  <option>None</option>
  <option>NEW</option>
  <option>HOT</option>
  <option>UPDATE</option>
</select>

<input id="badgeText" placeholder="Badge text (optional)">

<select id="visibility">
  <option>All</option>
  <option>Logged Users</option>
  <option>Guests</option>
</select>

<input id="priority" placeholder="Priority (1–99)">

<label class="check"><input type="checkbox" id="active"> Active</label>
<label class="check"><input type="checkbox" id="newTab"> Open in New Tab</label>

</div>
</div>

<div class="modal-footer">
<button onclick="saveItem()">💾 Save Item</button>
</div>
</div>
</div>

<script>


const API="/api/admin/sidebar";

let items=[];
let editId=null;

/* ===============================
   SAFE FETCH
================================ */
async function apiFetch(url,options={}){

  const res=await fetch(url,{
    ...options,
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+localStorage.getItem("AUTH_TOKEN"),
      ...options.headers
    }
  });

  if(!res.ok){
    localStorage.removeItem("AUTH_TOKEN");
    location.href="login.html";
    throw new Error("Session expired");
  }

  return res.json().catch(()=>({}));
}

/* ===============================
   UTIL
================================ */
function sanitize(str,max=150){
  return (str||"").trim().substring(0,max);
}

function clamp(v,min,max){
  v=Number(v);
  if(isNaN(v)) return min;
  return Math.max(min,Math.min(max,v));
}

function isValidURL(u){
  if(!u) return false;
  if(u.startsWith("/")) return true; // internal allowed
  try{
    new URL(u);
    return true;
  }catch{
    return false;
  }
}

function showStatus(msg,isError=false){
  const btn=document.querySelector(".add-btn");
  const original=btn.innerText;

  btn.innerText=msg;
  btn.style.background=isError?"#ff4c4c":"#00ffd5";
  btn.style.color=isError?"#fff":"#000";

  setTimeout(()=>{
    btn.innerText=original;
    btn.style.background="#ffcc00";
    btn.style.color="#000";
  },1500);
}

/* ===============================
   MODAL
================================ */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

function closeModal(){

  document.getElementById("modal").style.display="none";

  title.value="";
  icon.value="";
  url.value="";
  device.value="All";
  visibility.value="All";
  highlight.value="None";
  badgeText.value="";
  priority.value="";
  active.checked=true;
  newTab.checked=false;

  editId=null;
}

/* ===============================
   LOAD ITEMS
================================ */
async function loadItems(){

  try{
    items=await apiFetch(API);
    render();
  }catch(err){
    console.error("Load failed:",err);
  }

}

/* ===============================
   SAVE ITEM
================================ */
async function saveItem(){

  try{

    const cleanURL=sanitize(url.value,200);

    if(!sanitize(title.value)){
      showStatus("Title required ❌",true);
      return;
    }

    if(!isValidURL(cleanURL)){
      showStatus("Invalid URL ❌",true);
      return;
    }

    const payload={
      _id:editId,
      title:sanitize(title.value,120),
      icon:sanitize(icon.value,20),
      url:cleanURL,
      device:device.value,
      visibility:visibility.value,
      highlight:highlight.value,
      badge:sanitize(badgeText.value,30),
      priority:clamp(priority.value,1,99),
      active:active.checked,
      newTab:newTab.checked
    };

    await apiFetch(API,{
      method:"POST",
      body:JSON.stringify(payload)
    });

    closeModal();
    loadItems();
    showStatus("Saved ✔");

  }catch(err){
    console.error("Save failed:",err);
    showStatus("Save failed ❌",true);
    loadItems(); // rollback
  }

}

/* ===============================
   DELETE ITEM
================================ */
async function delItem(id){

  if(!confirm("Delete this sidebar item?")) return;

  try{

    await apiFetch(API,{
      method:"DELETE",
      body:JSON.stringify({ id })
    });

    loadItems();

  }catch(err){
    console.error("Delete failed:",err);
  }

}

/* ===============================
   EDIT
================================ */
function editItem(id){

  const i=items.find(x=>x._id===id);
  if(!i) return;

  editId=id;

  title.value=i.title||"";
  icon.value=i.icon||"";
  url.value=i.url||"";
  device.value=i.device||"All";
  visibility.value=i.visibility||"All";
  highlight.value=i.highlight||"None";
  badgeText.value=i.badge||"";
  priority.value=i.priority||99;
  active.checked=!!i.active;
  newTab.checked=!!i.newTab;

  openModal();
}

/* ===============================
   RENDER
================================ */
function render(){

  const list=document.getElementById("list");
  list.innerHTML="";

  items
    .sort((a,b)=>a.priority-b.priority)
    .forEach((i,idx)=>{

      list.innerHTML+=`
        <div class="row">
          <span>${idx+1}</span>

          <span>
            ${i.icon||""} ${i.title}
            ${i.highlight!=="None"
              ? `<span class="badge">${i.highlight}</span>`
              : ""}
          </span>

          <span>${i.url}</span>
          <span>${i.device}</span>

          <span class="badge">
            ${i.active?"ON":"OFF"}
          </span>

          <span class="actions">
            <button onclick="editItem('${i._id}')">✏️</button>
            <button onclick="delItem('${i._id}')">🗑</button>
          </span>
        </div>
      `;
    });

}

/* INIT */
loadItems();

</script>
</body>
</html>
