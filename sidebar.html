<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sidebar CMS – AnimeHunt</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:#060a14;color:#fff}
.cms-app{display:flex;min-height:100vh}

/* ===== ADMIN SIDEBAR (UNCHANGED LINKS) ===== */
.cms-sidebar{
  width:230px;background:#070b16;border-right:1px solid #1a2035;padding:14px 0
}
.brand{padding:0 18px 14px;font-size:20px}
.brand b{color:#ffcc00}
.brand small{display:block;font-size:11px;color:#888}
.cms-menu a{
  display:block;padding:10px 18px;color:#ccc;text-decoration:none;font-size:14px
}
.cms-menu a.active,.cms-menu a:hover{
  background:#0e1424;color:#ffcc00
}

/* ===== MAIN ===== */
.cms-main{flex:1}
.cms-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px;background:#070b16;border-bottom:1px solid #1a2035
}
.add-btn{
  background:#ffcc00;border:none;padding:8px 16px;
  border-radius:8px;font-weight:600;cursor:pointer
}
.cms-content{padding:20px}

/* ===== TABLE ===== */
.table{
  background:#0b0f1a;border:1px solid #1a2035;
  border-radius:12px;overflow:hidden
}
.head,.row{
  display:grid;
  grid-template-columns:40px 1.5fr 1.5fr 80px 80px 160px;
  padding:12px;font-size:12px;align-items:center
}
.head{background:#0e1424;color:#aaa}
.row{border-top:1px solid #1a2035}
.actions button{
  background:none;border:none;color:#ffcc00;
  cursor:pointer;margin-right:6px
}
.badge{
  background:#1a2035;padding:3px 6px;
  border-radius:6px;font-size:10px
}

/* ===== MODAL ===== */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;z-index:9999
}
.modal-box{
  width:760px;background:#0b0f1a;
  border:1px solid #1a2035;border-radius:14px;overflow:hidden
}
.modal-header{
  background:#0e1424;padding:14px 16px;
  display:flex;justify-content:space-between
}
.modal-body{padding:16px}
.modal-footer{
  background:#0e1424;padding:14px 16px;text-align:right
}
.modal-footer button{
  background:#ffcc00;border:none;
  padding:8px 18px;border-radius:8px;font-weight:600
}
.form-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px
}
.form-grid input,.form-grid select{
  background:#0e1424;border:1px solid #1a2035;
  color:#fff;padding:8px;border-radius:6px;font-size:12px
}
.check{display:flex;gap:6px;font-size:12px;align-items:center}
.full{grid-column:1/4}
</style>
</head>

<body>

<div class="cms-app">

<!-- ===== ADMIN MENU (UNCHANGED) ===== -->
<aside class="cms-sidebar">
  <div class="brand">
    <span>Anime</span><b>Hunt</b>
    <small>CMS</small>
  </div>

  <nav class="cms-menu">

    <!-- CORE -->
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="anime.html">🎬 Anime</a>
    <a href="episodes.html">📺 Episodes</a>
    <a href="categories.html">🗂 Catagorys</a>
    <a href="banners.html">🖼 Banners</a>
    <a href="homepage.html">🏠 Homepage</a>

    <!-- CONTENT -->
    <a href="downloads.html">📥 Downloads</a>
    <a href="servers.html">🌐 Servers</a>
    <a href="player.html">🎞 Player</a>
    <a href="search.html">🔍 Search</a>

    <!-- DATA & SEO -->
    <a href="seo.html">📈 Seo</a>
    <a href="analytics.html">📊 Analytics</a>
    <a href="performance.html">⚡ Performance</a>

    <!-- SECURITY & DEPLOY -->
    <a href="security.html">🔐 Security</a>
    <a href="deploy-backup.html">🚀 Deploy-backup</a>

    <!-- AI & ADS -->
    <a href="ads.html">📢 Ads</a>
    <a href="ai-brain.html">🧠 Ai Brain</a>

    <!-- LAYOUT CONTROL -->
    <a href="sidebar.html" class="active">📌 Sidebar</a>
    <a href="footer.html">🦶 Footer</a>

    <!-- ADMIN / SYSTEM (LAST) -->
    <a href="system-settings.html">⚙ System-settings</a>

  </nav>
</aside>

<!-- ===== MAIN ===== -->
<main class="cms-main">

<header class="cms-header">
  <div>📌 Sidebar Manager</div>
  <button class="add-btn" onclick="openModal()">➕ Add Sidebar Item</button>
</header>

<section class="cms-content">

<div class="table">
<div class="head">
  <span>#</span>
  <span>Title</span>
  <span>URL</span>
  <span>Device</span>
  <span>Status</span>
  <span>Actions</span>
</div>
<div id="list"></div>
</div>

</section>
</main>
</div>

<!-- ===== MODAL ===== -->
<div class="modal" id="modal">
<div class="modal-box">
<div class="modal-header">
  <h3>Sidebar Item</h3>
  <span onclick="closeModal()">✕</span>
</div>

<div class="modal-body">
<div class="form-grid">

<input id="title" placeholder="Title (About AnimeHunt)">
<input id="icon" placeholder="Icon / Emoji">
<input id="url" placeholder="Link (/about.html)">

<select id="device">
  <option>All</option>
  <option>Desktop</option>
  <option>Mobile</option>
</select>

<select id="highlight">
  <option>None</option>
  <option>NEW</option>
  <option>HOT</option>
  <option>UPDATE</option>
</select>

<input id="badgeText" placeholder="Badge text (optional)">

<select id="visibility">
  <option>All</option>
  <option>Logged Users</option>
  <option>Guests</option>
</select>

<input id="priority" placeholder="Priority (1–99)">

<label class="check"><input type="checkbox" id="active"> Active</label>
<label class="check"><input type="checkbox" id="newTab"> Open in New Tab</label>

</div>
</div>

<div class="modal-footer">
<button onclick="saveItem()">💾 Save Item</button>
</div>
</div>
</div>

    <script>

const API="https://animehunt-backend.animehunt715.workers.dev/api/admin/sidebar"
const TOKEN_KEY="AUTH_TOKEN"

let items=[]
let editId=null

const el=id=>document.getElementById(id)

/* =========================
API HELPER
========================= */

async function apiFetch(url,options={}){

const token=localStorage.getItem(TOKEN_KEY)

try{

const res=await fetch(url,{
...options,
headers:{
"Content-Type":"application/json",
"Authorization":token?`Bearer ${token}`:"",
...options.headers
}
})

if(res.status===401){

location.href="login.html"
return null

}

return await res.json()

}catch{

alert("Network Error")
return null

}

}

/* =========================
LOAD SIDEBAR ITEMS
========================= */

async function loadItems(){

const data=await apiFetch(API)

if(!data) return

items=data

render()

}

/* =========================
RENDER TABLE
========================= */

function render(){

const list=el("list")

list.innerHTML=""

if(!items.length){

list.innerHTML="<div style='padding:20px;color:#666'>No sidebar items</div>"
return

}

items
.sort((a,b)=>a.priority-b.priority)
.forEach(i=>{

const row=document.createElement("div")

row.className="row"

let badgeColor="#1a2035"

if(i.highlight==="HOT") badgeColor="#ff4c4c"
if(i.highlight==="NEW") badgeColor="#00ffb3"
if(i.highlight==="UPDATE") badgeColor="#ffc107"

let highlightTag=""

if(i.highlight!=="None"){

highlightTag=`
<small style="
font-size:9px;
padding:2px 4px;
border-radius:4px;
margin-left:5px;
background:${badgeColor};
color:#000
">${i.highlight}</small>
`

}

row.innerHTML=`

<span>${i.priority}</span>

<span>
${i.icon||""} ${i.title}
${highlightTag}
</span>

<span style="color:#777;font-size:10px;overflow:hidden;text-overflow:ellipsis">
${i.url}
</span>

<span><small class="badge">${i.device}</small></span>

<span style="color:${i.active?'#00ffb3':'#ff4c4c'}">
${i.active?'● Active':'○ Hidden'}
</span>

<span class="actions">
<button onclick="editItem('${i.id}')">✏️</button>
<button onclick="delItem('${i.id}')" style="color:#ff4c4c">🗑</button>
</span>

`

list.appendChild(row)

})

}

/* =========================
SAVE ITEM
========================= */

async function saveItem(){

const payload={

_id:editId,

title:el("title").value.trim(),
icon:el("icon").value.trim(),
url:el("url").value.trim(),

device:el("device").value,
visibility:el("visibility").value,

highlight:el("highlight").value,
badge:el("badgeText").value.trim(),

priority:Number(el("priority").value||99),

active:el("active").checked,
newTab:el("newTab").checked

}

if(!payload.title || !payload.url){

alert("Title and URL required")
return

}

const res=await apiFetch(API,{
method:"POST",
body:JSON.stringify(payload)
})

if(res?.success){

closeModal()
loadItems()

}

}

/* =========================
EDIT ITEM
========================= */

function editItem(id){

const i=items.find(x=>x.id===id)

if(!i) return

editId=id

el("title").value=i.title||""
el("icon").value=i.icon||""
el("url").value=i.url||""

el("device").value=i.device||"All"
el("visibility").value=i.visibility||"All"

el("highlight").value=i.highlight||"None"
el("badgeText").value=i.badge||""

el("priority").value=i.priority||99

el("active").checked=!!i.active
el("newTab").checked=!!i.newTab

el("modal").style.display="flex"

}

/* =========================
DELETE ITEM
========================= */

async function delItem(id){

if(!confirm("Delete sidebar item?")) return

const res=await apiFetch(`${API}/${id}`,{
method:"DELETE"
})

if(res?.success){

loadItems()

}

}

/* =========================
OPEN MODAL
========================= */

function openModal(){

editId=null

el("title").value=""
el("icon").value=""
el("url").value=""
el("priority").value=""

el("device").value="All"
el("visibility").value="All"

el("highlight").value="None"
el("badgeText").value=""

el("active").checked=true
el("newTab").checked=false

el("modal").style.display="flex"

}

/* =========================
CLOSE MODAL
========================= */

function closeModal(){

el("modal").style.display="none"

}

/* =========================
INIT
========================= */

document.addEventListener("DOMContentLoaded",()=>{

loadItems()

})

    </script>


  
</body>
</html>
